<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard AoL - FEN U. de Chile</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f8fafc; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- DATOS DEL GRÁFICO ---
        const groupedData = [
          {
            category: 'Desempeños de la Especialidad',
            color: '#0D9488',
            items: [
              { name: 'Uso de Herramientas y Criterios en Contexto Incierto', values: [75, 75, 96, 93, 87] },
              { name: 'Adaptabilidad a Cambios Económicos', values: [53, 69, 48, 84, 74] },
              { name: 'Análisis de Escenarios para la Toma de Decisiones', values: [69, 69, 71, 87, 86] }
            ]
          },
          {
            category: 'Desempeños Comunicación Efectiva',
            color: '#2563EB',
            items: [
              { name: 'Análisis de contenido', values: [82, 50, 55, 71, 56] },
              { name: 'Argumentación', values: [51, 44, 8, 46, 83] },
              { name: 'Producción de discursos', values: [53, 56, 56, 67, 64] },
              { name: 'Voz propia y creativa', values: [29, 6, 0, 6, 40] }
            ]
          },
          {
            category: 'Desempeños Discernimiento Ético',
            color: '#EA580C',
            items: [
              { name: 'Delimitación de dilemas éticos', values: [16, 0, 0, 0, 0] },
              { name: 'Proyección de significados y consecuencias', values: [19, 13, 1, 6, 23] },
              { name: 'Integración de componente ético en la toma de decisiones', values: [10, 19, 1, 0, 41] }
            ]
          }
        ];

        const years = [2021, 2022, 2023, 2024, 2025];

        // --- TEXTOS PREDEFINIDOS (SIN CONEXIÓN A INTERNET) ---
        
        const TEXTO_ANALISIS_GLOBAL = `El análisis de la estructura de 75 exámenes de grado (2021-2025) muestra una sólida base en los **Desempeños de la Especialidad (64%)**, con preguntas analíticas bien logradas en diversas áreas. Esta cifra refleja la profundidad técnica y el compromiso con la excelencia que caracteriza a la labor académica de la Facultad.

Sin embargo, se identifica una oportunidad estratégica de enriquecimiento en **Comunicación Efectiva (56%)** y, de manera particular, en **Discernimiento Ético (15%)**. Se sugiere incorporar metodologías evaluativas que exijan fundamentación argumentativa y la anticipación de dilemas éticos reales en escenarios de negocios, alineándose con los estándares globales en la formación de líderes corporativos.`;

        const TEXTOS_PLANES_MEJORA = {
            'Uso de Herramientas y Criterios en Contexto Incierto': `Se sugieren los siguientes enfoques estratégicos:\n\n**Evaluación de Herramientas Ágiles:** Incorporar casos donde la información sea deliberadamente incompleta, forzando al estudiante a justificar sus supuestos.\n\n**Simulación de Crisis:** Plantear escenarios donde las variables críticas cambien a mitad del examen, evaluando la capacidad de re-cálculo y adaptación del criterio financiero.`,
            
            // Texto detallado y solicitado específicamente por el usuario
            'Adaptabilidad a Cambios Económicos': `Se sugieren los siguientes enfoques estratégicos:

**Integración de Escenarios Prospectivos Dinámicos:** Consiste en invitar al estudiante a proyectar soluciones ante variaciones de mercado simuladas en tiempo real. Un excelente punto de partida es el modelo del Examen de Marketing (Otoño 2021), donde se desafió al alumno con la pregunta: *“¿A qué tipo de estrategia de crecimiento corresponde...?”*. Replicar este nivel de análisis permite que el estudiante no solo identifique la teoría, sino que seleccione la ruta estratégica más resiliente frente a la volatilidad económica.

**Evaluación del Impacto Organizacional Multidimensional:** Se propone vincular los cambios macroeconómicos con respuestas operativas concretas de la firma. Un referente de vanguardia es el Examen de RRHH (Verano 2025), cuyo diseño solicitaba: *“Proponga al menos dos objetivos organizacionales...”*. Seguir esta línea de evaluación permite medir la capacidad del futuro profesional para traducir el contexto económico en acciones tácticas y estratégicas que aseguren la sostenibilidad institucional.

Estos modelos de preguntas analíticas, que ustedes ya aplican con éxito, representan la base ideal para seguir avanzando hacia los estándares de evaluación más exigentes a nivel global.`,
            
            'Análisis de Escenarios para la Toma de Decisiones': `Se sugieren los siguientes enfoques estratégicos:\n\n**Casos de Estudio Multivariables:** Diseñar preguntas que obliguen al estudiante a ponderar múltiples variables financieras y de marketing simultáneamente.\n\n**Defensa de Estrategias:** Evaluar la capacidad de defender una decisión estratégica ante alternativas de inversión competitivas.`,
            
            'Análisis de contenido': `Se sugieren los siguientes enfoques estratégicos:\n\n**Diversificación de Instrumentos:** Incorporar de manera progresiva ensayos cortos o propuestas de negocios escritas en secciones específicas del examen.\n\n**Rúbricas de Comunicación:** Evaluar explícitamente la estructura, claridad y capacidad de síntesis en las respuestas de desarrollo extenso.`,
            
            'Argumentación': `Se sugieren los siguientes enfoques estratégicos:\n\n**Defensa de Casos:** Integrar instancias donde el estudiante deba justificar teóricamente sus decisiones numéricas.\n\n**Contraste de Posturas:** Solicitar al estudiante que analice y refute una estrategia opuesta a la suya, demostrando dominio de la argumentación en negocios.`,
            
            'Producción de discursos': `Se sugieren los siguientes enfoques estratégicos:\n\n**Adaptación de Audiencia:** Pedir al estudiante que estructure su respuesta técnica como si fuera un informe dirigido a un Directorio o a inversionistas no especialistas.\n\n**Uso de Lenguaje Disciplinar:** Fomentar y evaluar la precisión en la terminología técnica de negocios en todas las áreas del examen.`,
            
            'Voz propia y creativa': `Se sugieren los siguientes enfoques estratégicos:\n\n**Resolución Creativa de Problemas:** Incluir ítems de final abierto donde se premie la originalidad y la viabilidad de la solución propuesta.\n\n**Propuestas de Innovación:** Evaluar la capacidad de identificar nuevos nichos de mercado o mejoras disruptivas de procesos organizacionales.`,
            
            'Delimitación de dilemas éticos': `Se sugieren los siguientes enfoques estratégicos:\n\n**Inclusión de Conflictos de Interés:** Diseñar casos donde el estudiante deba identificar claramente las partes afectadas por una decisión corporativa y los posibles sesgos de los directivos.\n\n**Análisis Normativo vs. Ético:** Preguntar explícitamente por las zonas grises donde lo estrictamente legal no coincide necesariamente con lo ético o lo sostenible.`,
            
            'Proyección de significados y consecuencias': `Se sugieren los siguientes enfoques estratégicos:\n\n**Evaluación de Sostenibilidad:** Incorporar preguntas sobre el impacto ambiental, social y de gobernanza (ESG) a largo plazo de los proyectos de inversión.\n\n**Mapeo de Stakeholders:** Exigir que las respuestas consideren de manera obligatoria las consecuencias operativas para empleados, comunidad y medio ambiente.`,
            
            'Integración de componente ético en la toma de decisiones': `Se sugieren los siguientes enfoques estratégicos:\n\n**Dilemas Integrados:** No aislar la dimensión ética en una sola pregunta al final del examen, sino hacer que la viabilidad general del proyecto evaluado dependa de su solidez ética.\n\n**Ponderación Estratégica:** Asignar un porcentaje explícito de la calificación de la sección a la correcta ponderación de los factores éticos involucrados en la toma de decisiones.`
        };

        // Función simuladora para dar el efecto de "procesando" (Delay de medio segundo)
        const simulateDelay = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        // --- COMPONENTES DE UI ---
        const TextFormatter = ({ text }) => {
            if (!text) return null;
            return text.split('\n').map((line, i) => {
                if (!line.trim()) return <br key={i} />;
                const boldLine = line.split(/(\*\*.*?\*\*)/).map((part, j) => {
                    if (part.startsWith('**') && part.endsWith('**')) {
                        return <strong key={j} className="text-slate-900 font-bold">{part.slice(2, -2)}</strong>;
                    }
                    return part;
                });
                return <p key={i} className="mb-3 text-slate-600 leading-relaxed text-sm md:text-base">{boldLine}</p>;
            });
        };

        const BarChartRow = ({ name, values, color, active, onAction }) => {
            const maxH = 64;
            return (
                <div className="flex flex-col md:flex-row items-center py-6 border-b border-slate-100 last:border-0 group">
                    <div className="w-full md:w-2/5 pr-4 mb-4 md:mb-0">
                        <h3 className="text-sm font-bold text-slate-700 leading-snug group-hover:text-blue-600 transition-colors">{name}</h3>
                        <button 
                            onClick={() => onAction(name)}
                            className="mt-3 inline-flex items-center gap-2 px-3 py-1.5 bg-white border border-slate-200 rounded-full text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-blue-600 hover:border-blue-200 hover:bg-blue-50 transition-all opacity-0 group-hover:opacity-100"
                        >
                            ✨ Plan de Mejora
                        </button>
                    </div>
                    <div className="w-full md:w-3/5 h-16 flex items-end justify-between px-2 gap-3">
                        {values.map((v, i) => (
                            <div key={i} className="flex-1 flex flex-col items-center group/bar relative">
                                <div 
                                    className="w-full rounded-t-md transition-all duration-1000 ease-out"
                                    style={{ 
                                        height: active ? `${(v/100)*maxH}px` : '4px', 
                                        backgroundColor: v === 0 ? '#f1f5f9' : color,
                                        opacity: 0.8
                                    }}
                                ></div>
                                <span className="text-[8px] font-bold text-slate-400 mt-2">{years[i]}</span>
                                <div className="absolute -top-8 bg-slate-800 text-white text-[9px] px-1.5 py-1 rounded opacity-0 group-hover/bar:opacity-100 transition-opacity pointer-events-none">
                                    {v}%
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        function App() {
          const [ready, setReady] = useState(false);
          const [analysis, setAnalysis] = useState({ loading: false, data: null });
          const [modal, setModal] = useState({ open: false, loading: false, title: '', content: '' });

          useEffect(() => {
            setTimeout(() => setReady(true), 100);
          }, []);

          // Acción simulada para la Síntesis Global
          const generateGlobalReport = async () => {
            setAnalysis({ loading: true, data: null });
            await simulateDelay(600); // Pequeña pausa para efecto visual
            setAnalysis({ loading: false, data: TEXTO_ANALISIS_GLOBAL });
          };

          // Acción simulada para los Planes de Mejora Individuales
          const openActionPlan = async (name) => {
            setModal({ open: true, loading: true, title: name, content: '' });
            await simulateDelay(500); // Pequeña pausa para mostrar el spinner
            
            // Busca el texto predefinido, si no existe, muestra un mensaje por defecto
            const contenidoPredefinido = TEXTOS_PLANES_MEJORA[name] || "Plan de mejora en construcción para esta competencia.";
            
            setModal(prev => ({ ...prev, loading: false, content: contenidoPredefinido }));
          };

          return (
            <div className="max-w-4xl mx-auto p-4 md:py-12">
              <div className="bg-white rounded-[2.5rem] shadow-2xl border border-slate-200 overflow-hidden animate-fade-in">
                
                {/* Header */}
                <div className="p-8 md:p-12 border-b border-slate-50 flex flex-col md:flex-row justify-between items-start md:items-center gap-8">
                  <div className="space-y-2">
                    <div className="flex items-center gap-3">
                        <span className="px-2 py-1 bg-blue-600 text-white text-[9px] font-black rounded uppercase tracking-widest">AoL v2026</span>
                        <p className="text-slate-400 font-bold text-[10px] uppercase tracking-widest">Universidad de Chile • FEN</p>
                    </div>
                    <h1 className="text-4xl font-black text-slate-900 tracking-tight">Dashboard de Compatibilidad</h1>
                    <p className="text-slate-500 text-sm">Validación de instrumentos de evaluación de egreso (2021-2025)</p>
                  </div>
                  <button 
                    onClick={generateGlobalReport}
                    disabled={analysis.loading}
                    className="group relative bg-slate-900 text-white px-8 py-4 rounded-2xl font-bold text-sm hover:bg-blue-600 transition-all flex items-center gap-3 disabled:opacity-50"
                  >
                    {analysis.loading ? "Procesando..." : "✨ Síntesis Inteligente"}
                  </button>
                </div>

                {/* Síntesis AI (Ahora con datos predefinidos) */}
                {analysis.data && (
                  <div className="mx-8 md:mx-12 mt-8 p-8 bg-blue-50 rounded-3xl border border-blue-100 animate-fade-in">
                    <h2 className="text-blue-900 font-black text-[10px] uppercase tracking-[0.2em] mb-4 flex items-center gap-2">
                        <span className="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span> Perspectiva Estratégica
                    </h2>
                    <TextFormatter text={analysis.data} />
                  </div>
                )}

                {/* Categorías */}
                <div className="p-8 md:p-12 space-y-16">
                  {groupedData.map((cat, i) => (
                    <div key={i} className="animate-fade-in" style={{ animationDelay: `${i*0.1}s` }}>
                      <div className="flex items-center gap-4 mb-8">
                        <div className="h-8 w-1 rounded-full" style={{ backgroundColor: cat.color }}></div>
                        <h2 className="text-xs font-black text-slate-400 uppercase tracking-widest">{cat.category}</h2>
                      </div>
                      <div className="bg-slate-50/50 rounded-[2rem] p-6 md:p-10 border border-slate-100 shadow-sm">
                        {cat.items.map((item, j) => (
                          <BarChartRow key={j} {...item} color={cat.color} active={ready} onAction={openActionPlan} />
                        ))}
                      </div>
                    </div>
                  ))}
                </div>

                <footer className="p-10 bg-slate-50 text-center border-t border-slate-100">
                    <p className="text-[10px] text-slate-400 font-black uppercase tracking-[0.3em]">Centro de Enseñanza y Aprendizaje • 2026</p>
                </footer>
              </div>

              {/* MODAL CON RESPUESTAS PREDEFINIDAS */}
              {modal.open && (
                <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in">
                  <div className="bg-white w-full max-w-xl rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col max-h-[85vh]">
                    <div className="p-8 border-b border-slate-50 flex justify-between items-center bg-white">
                      <div className="pr-4">
                        <p className="text-blue-600 font-black text-[10px] uppercase tracking-widest mb-1">Acción Recomendada</p>
                        <h3 className="text-xl font-black text-slate-900 leading-tight">{modal.title}</h3>
                      </div>
                      <button 
                        onClick={() => setModal({open: false})}
                        className="p-2 bg-slate-100 text-slate-500 rounded-full hover:bg-red-50 hover:text-red-500 transition-all"
                      >
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                      </button>
                    </div>
                    
                    <div className="p-8 overflow-y-auto custom-scroll flex-1">
                      {modal.loading ? (
                        <div className="flex flex-col items-center justify-center py-12 text-slate-400 gap-4">
                          <div className="w-10 h-10 border-4 border-blue-100 border-t-blue-600 rounded-full animate-spin"></div>
                          <p className="text-xs font-bold uppercase tracking-widest">Consultando experto...</p>
                        </div>
                      ) : (
                        <div className="animate-fade-in">
                           <TextFormatter text={modal.content} />
                        </div>
                      )}
                    </div>

                    <div className="p-8 bg-slate-50 border-t border-slate-100 flex justify-center">
                        <button 
                            onClick={() => setModal({open: false})}
                            className="bg-white border border-slate-200 text-slate-900 px-10 py-3 rounded-2xl font-bold text-xs uppercase tracking-widest hover:shadow-md transition-all active:scale-95"
                        >
                            Cerrar Sugerencia
                        </button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
