        const ANALISIS_GLOBAL_POR_DISCIPLINA = {

Se recomienda diversificar los ítems hacia la **Comunicación Efectiva** y el **Discernimiento Ético** (con especial urgencia en la delimitación de dilemas éticos, que registra un 0% constante), exigiendo a los estudiantes fundamentar cualitativamente sus decisiones numéricas y ponderar las consecuencias a largo plazo (sostenibilidad, stakeholders) de la rentabilidad proyectada.`,

            'Gestión Integral de Problemáticas Organizacionales': `Se sugieren los siguientes enfoques estratégicos:\n\n**Casos Multidimensionales:** Utilizar metodologías de evaluación que requieran alinear soluciones de operaciones, flujo de caja y gestión del talento en una única respuesta directiva.`,
            'Innovación y Creación de Valor': `Se sugieren los siguientes enfoques estratégicos:\n\n**Premiación de la Disrupción:** Considerando su bajo nivel de compatibilidad actual, se recomienda incluir ítems que exijan replantear el modelo de ingresos o incorporar transformación digital a modelos de negocio tradicionales.`,

            'Producción de discursos': `Se sugieren los siguientes enfoques estratégicos:\n\n**Adaptación de Audiencia:** Pedir al estudiante que estructure su respuesta como si fuera un informe dirigido a un Directorio, clientes o sindicato.\n\n**Uso de Lenguaje Disciplinar:** Fomentar y evaluar la precisión en la terminología técnica de la respectiva especialidad en todo el desarrollo.`,
            'Voz propia y creativa': `Se sugieren los siguientes enfoques estratégicos:\n\n**Resolución Creativa de Problemas:** Incluir ítems de final abierto donde se premie la originalidad fundamentada y la viabilidad de la solución propuesta.\n\n**Fomento del Juicio Crítico:** Penalizar en la rúbrica las respuestas "de manual" y premiar las perspectivas propias del estudiante sobre el caso.`,
            'Delimitación de dilemas éticos': `Se sugieren los siguientes enfoques estratégicos:\n\n**Inclusión de Conflictos de Interés:** Diseñar casos donde el estudiante deba identificar claramente las partes afectadas por una decisión corporativa y los posibles sesgos de los directivos.\n\n**Análisis Normativo vs. Ético:** Preguntar explícitamente por las zonas grises donde lo estrictamente legal no coincide necesariamente con lo ético o lo sostenible.`,

            'Integración de componente ético en la toma de decisiones': `Se sugieren los siguientes enfoques estratégicos:\n\n**Dilemas Integrados:** No aislar la dimensión ética en una sola pregunta final, sino hacer que la viabilidad general de la estrategia dependa de su solidez moral.\n\n**Ponderación Estratégica:** Asignar un porcentaje explícito de la calificación de la sección a la correcta ponderación de los factores éticos involucrados en la resolución.`

        const simulateDelay = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        // --- COMPONENTES DE UI ---
        const TextFormatter = ({ text }) => {
            if (!text) return null;
            return text.split('\n').map((line, i) => {
                if (!line.trim()) return <br key={i} />;
                const boldLine = line.split(/(\*\*.*?\*\*)/).map((part, j) => {
                    if (part.startsWith('**') && part.endsWith('**')) {
                        return <strong key={j} className="text-slate-900 font-bold">{part.slice(2, -2)}</strong>;
                    }
                    return part;
                });
                return <p key={i} className="mb-3 text-slate-600 leading-relaxed text-sm md:text-base">{boldLine}</p>;
            });
        };

        const BarChartRow = ({ name, values, color, active, onAction }) => {
            const maxH = 64;
            return (
                <div className="flex flex-col md:flex-row items-center py-6 border-b border-slate-100 last:border-0 group">
                    <div className="w-full md:w-2/5 pr-4 mb-4 md:mb-0">
                        <h3 className="text-sm font-bold text-slate-700 leading-snug group-hover:text-blue-600 transition-colors">{name}</h3>
                        <button

                            className="mt-3 inline-flex items-center gap-2 px-3 py-1.5 bg-white border border-slate-200 rounded-full text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-blue-600 hover:border-blue-200 hover:bg-blue-50 transition-all opacity-0 group-hover:opacity-100"

                        </button>

                    <div className="w-full md:w-3/5 h-16 flex items-end justify-between px-2 gap-3">

                                    className="w-full rounded-t-md transition-all duration-1000 ease-out"
                                    style={{ 
                                        height: active ? `${(v/100)*maxH}px` : '4px', 
                                        backgroundColor: v === 0 ? '#f1f5f9' : color,
                                        opacity: 0.8
                                    }}
                                ></div>
                                <span className="text-[8px] font-bold text-slate-400 mt-2">{years[i]}</span>
                                <div className="absolute -top-8 bg-slate-800 text-white text-[9px] px-1.5 py-1 rounded opacity-0 group-hover/bar:opacity-100 transition-opacity pointer-events-none z-10 shadow-lg">
                                    {v}%
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        function App() {
          const [ready, setReady] = useState(false);
          const [currentDiscipline, setCurrentDiscipline] = useState('Finanzas');
          const [analysis, setAnalysis] = useState({ loading: false, data: null });
          const [modal, setModal] = useState({ open: false, loading: false, title: '', content: '' });

          useEffect(() => {
            setReady(false);
            setAnalysis({ loading: false, data: null });
            
            const loadAnalysis = async () => {
              setAnalysis({ loading: true, data: null });
              await simulateDelay(400);
              setAnalysis({ loading: false, data: ANALISIS_GLOBAL_POR_DISCIPLINA[currentDiscipline] });
              setReady(true);
            };
            
            loadAnalysis();
          }, [currentDiscipline]);

          const openActionPlan = async (name) => {
            setModal({ open: true, loading: true, title: name, content: '' });
            await simulateDelay(400);
            const contenidoPredefinido = TEXTOS_PLANES_MEJORA[name] || `Se sugieren los siguientes enfoques estratégicos:\n\n**Integración de Casos Prácticos:** Vincular esta competencia con la resolución de problemas reales observados en el mercado corporativo actual.\n\n**Evaluación por Rúbrica:** Incorporar indicadores explícitos en las pautas de corrección para visibilizar y cuantificar el logro de este desempeño específico.`;
            setModal(prev => ({ ...prev, loading: false, content: contenidoPredefinido }));
          };

          const activeData = DATA_POR_DISCIPLINA[currentDiscipline];
          const disciplinesList = Object.keys(DATA_POR_DISCIPLINA);

            <div className="max-w-4xl mx-auto p-4 md:py-12">

                {/* Header Institucional */}
                <div className="p-8 md:p-12 pb-8 border-b border-slate-50 flex flex-col md:flex-row justify-between items-start md:items-center gap-8">
                  <div className="space-y-2">
                    <div className="flex items-center gap-3">
                        <span className="px-2 py-1 bg-blue-600 text-white text-[9px] font-black rounded uppercase tracking-widest">Centro de Enseñanza y Aprendizaje</span>
                        <p className="text-slate-400 font-bold text-[10px] uppercase tracking-widest">Universidad de Chile • FEN</p>
                    </div>
                    <h1 className="text-3xl md:text-4xl font-black text-slate-900 tracking-tight">IC Licenciatura en Administración</h1>
                    <p className="text-slate-500 text-sm">Compatibilidad histórica de exámenes de grado (2021-2025)</p>
                  </div>
                </div>

                {/* Barra de Navegación de Disciplinas */}

                    <button 
                      key={disc}
                      onClick={() => setCurrentDiscipline(disc)}
                      className={`whitespace-nowrap px-6 py-2.5 rounded-full text-xs font-black uppercase tracking-widest tab-transition ${
                        currentDiscipline === disc 
                        ? 'bg-[#1E3A8A] text-white shadow-lg ring-2 ring-[#1E3A8A] ring-offset-2' 
                        : 'bg-white text-slate-400 border border-slate-200 hover:border-blue-300 hover:text-blue-600 shadow-sm'
                      }`}
                    >
                      {disc}
                    </button>
                  ))}
                </div>

                {/* Contenido (Forzado a re-renderizar al cambiar disciplina) */}
                <div key={currentDiscipline}>
                    {/* Síntesis Ejecutiva */}
                    {analysis.data && (
                      <div className="mx-8 md:mx-12 mt-10 p-8 bg-blue-50 rounded-3xl border border-blue-100 animate-fade-in">
                        <h2 className="text-blue-900 font-black text-[10px] uppercase tracking-[0.2em] mb-4 flex items-center gap-2">
                            <span className="w-2 h-2 bg-blue-500 rounded-full"></span> Síntesis Ejecutiva del Informe: {currentDiscipline}
                        </h2>
                        <TextFormatter text={analysis.data} />
                      </div>
                    )}

                    {/* Gráficos y Categorías */}
                    <div className="p-8 md:p-12 space-y-16">
                      {activeData.map((cat, i) => (
                        <div key={i} className="animate-fade-in" style={{ animationDelay: `${i*0.1}s` }}>
                          <div className="flex items-center gap-4 mb-8">
                            <div className="h-8 w-1 rounded-full" style={{ backgroundColor: cat.color }}></div>
                            <h2 className="text-xs font-black text-slate-400 uppercase tracking-widest">{cat.category}</h2>
                          </div>
                          <div className="bg-slate-50/50 rounded-[2rem] p-6 md:p-10 border border-slate-100 shadow-sm">
                            {cat.items.map((item, j) => (
                              <BarChartRow key={j} {...item} color={cat.color} active={ready} onAction={openActionPlan} />
                            ))}
                          </div>
                        </div>
                      ))}
                    </div>
                </div>

                <footer className="p-10 bg-slate-50 text-center border-t border-slate-100">
                    <p className="text-[10px] text-slate-400 font-black uppercase tracking-[0.3em]">Centro de Enseñanza y Aprendizaje • 2026</p>
                </footer>
              </div>

              {/* MODAL PLAN DE MEJORA */}
              {modal.open && (
                <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in">
                  <div className="bg-white w-full max-w-xl rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col max-h-[85vh]">
                    <div className="p-8 border-b border-slate-50 flex justify-between items-center bg-white">
                      <div className="pr-4">
                        <p className="text-blue-600 font-black text-[10px] uppercase tracking-widest mb-1">Acción Recomendada</p>
                        <h3 className="text-xl font-black text-slate-900 leading-tight">{modal.title}</h3>
                      </div>
                      <button 
                        onClick={() => setModal({open: false})}
                        className="p-2 bg-slate-100 text-slate-500 rounded-full hover:bg-red-50 hover:text-red-500 transition-all"
                      >
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                      </button>
                    </div>
                    
                    <div className="p-8 overflow-y-auto custom-scroll flex-1">
                      {modal.loading ? (
                        <div className="flex flex-col items-center justify-center py-12 text-slate-400 gap-4">
                          <div className="w-10 h-10 border-4 border-blue-100 border-t-blue-600 rounded-full animate-spin"></div>
                          <p className="text-xs font-bold uppercase tracking-widest">Cargando estrategia...</p>
                        </div>
                      ) : (
                        <div className="animate-fade-in">
                           <TextFormatter text={modal.content} />
                        </div>
                      )}
                    </div>

                    <div className="p-8 bg-slate-50 border-t border-slate-100 flex justify-center">
                        <button 
                            onClick={() => setModal({open: false})}
                            className="bg-white border border-slate-200 text-slate-900 px-10 py-3 rounded-2xl font-bold text-xs uppercase tracking-widest hover:shadow-md transition-all active:scale-95"
                        >
                            Cerrar Sugerencia
                        </button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
