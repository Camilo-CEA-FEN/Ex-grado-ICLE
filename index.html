<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard AoL - FEN U. de Chile</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f8fafc; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- CONFIGURACIÓN ---
        // Pega tu clave asegurándote de no dejar espacios en blanco.
        const API_KEY_RAW = "AIzaSyCVILZ9H4tNsHE-ClQqhz0IeAI6T2k59YM"; // REEMPLAZAR AQUÍ
        
        // El sistema limpiará espacios accidentales por ti
        const API_KEY = API_KEY_RAW.trim(); 
        const MODELO = "gemini-2.5-flash-preview-09-2025"; 

        const groupedData = [
          {
            category: 'Desempeños de la Especialidad',
            color: '#0D9488',
            items: [
              { name: 'Uso de Herramientas y Criterios en Contexto Incierto', values: [75, 75, 96, 93, 87] },
              { name: 'Adaptabilidad a Cambios Económicos', values: [53, 69, 48, 84, 74] },
              { name: 'Análisis de Escenarios para la Toma de Decisiones', values: [69, 69, 71, 87, 86] }
            ]
          },
          {
            category: 'Desempeños Comunicación Efectiva',
            color: '#2563EB',
            items: [
              { name: 'Análisis de contenido', values: [82, 50, 55, 71, 56] },
              { name: 'Argumentación', values: [51, 44, 8, 46, 83] },
              { name: 'Producción de discursos', values: [53, 56, 56, 67, 64] },
              { name: 'Voz propia y creativa', values: [29, 6, 0, 6, 40] }
            ]
          },
          {
            category: 'Desempeños Discernimiento Ético',
            color: '#EA580C',
            items: [
              { name: 'Delimitación de dilemas éticos', values: [16, 0, 0, 0, 0] },
              { name: 'Proyección de significados y consecuencias', values: [19, 13, 1, 6, 23] },
              { name: 'Integración de componente ético en la toma de decisiones', values: [10, 19, 1, 0, 41] }
            ]
          }
        ];

        const years = [2021, 2022, 2023, 2024, 2025];

        // --- LLAMADA A LA API (CON DIAGNÓSTICO AVANZADO) ---
        const askGemini = async (prompt, systemInstruction) => {
          if (API_KEY === "TU_API_KEY_AQUI" || API_KEY === "") {
            return "⚠️ Error: Aún no has ingresado tu API Key en el código HTML.";
          }
          
          const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODELO}:generateContent?key=${API_KEY}`;
          
          try {
            const response = await fetch(url, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemInstruction }] }
              })
            });

            if (!response.ok) {
              // Atrapar el error exacto de Google
              let errorMsg = `Error HTTP ${response.status}`;
              try {
                const errorData = await response.json();
                errorMsg = errorData.error?.message || errorMsg;
              } catch(e) {
                errorMsg += " (No se pudo decodificar el detalle de Google).";
              }
              throw new Error(errorMsg);
            }

            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
          } catch (e) {
            console.error("Detalle del error:", e);
            return `**⚠️ Error de conexión con Google:**\n\n${e.message}\n\n*Posibles causas:* \n- La API Key es incorrecta o está desactivada.\n- La 'Generative Language API' no está habilitada en tu proyecto de Google Cloud.`;
          }
        };

        // --- COMPONENTES DE UI ---
        const TextFormatter = ({ text }) => {
            if (!text) return null;
            return text.split('\n').map((line, i) => {
                if (!line.trim()) return <br key={i} />;
                const boldLine = line.split(/(\*\*.*?\*\*)/).map((part, j) => {
                    if (part.startsWith('**') && part.endsWith('**')) {
                        return <strong key={j} className="text-slate-900 font-bold">{part.slice(2, -2)}</strong>;
                    }
                    return part;
                });
                return <p key={i} className="mb-3 text-slate-600 leading-relaxed text-sm md:text-base">{boldLine}</p>;
            });
        };

        const BarChartRow = ({ name, values, color, active, onAction }) => {
            const maxH = 64;
            return (
                <div className="flex flex-col md:flex-row items-center py-6 border-b border-slate-100 last:border-0 group">
                    <div className="w-full md:w-2/5 pr-4 mb-4 md:mb-0">
                        <h3 className="text-sm font-bold text-slate-700 leading-snug group-hover:text-blue-600 transition-colors">{name}</h3>
                        <button 
                            onClick={() => onAction(name, values, color)}
                            className="mt-3 inline-flex items-center gap-2 px-3 py-1.5 bg-white border border-slate-200 rounded-full text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-blue-600 hover:border-blue-200 hover:bg-blue-50 transition-all opacity-0 group-hover:opacity-100"
                        >
                            ✨ Plan de Mejora
                        </button>
                    </div>
                    <div className="w-full md:w-3/5 h-16 flex items-end justify-between px-2 gap-3">
                        {values.map((v, i) => (
                            <div key={i} className="flex-1 flex flex-col items-center group/bar relative">
                                <div 
                                    className="w-full rounded-t-md transition-all duration-1000 ease-out"
                                    style={{ 
                                        height: active ? `${(v/100)*maxH}px` : '4px', 
                                        backgroundColor: v === 0 ? '#f1f5f9' : color,
                                        opacity: 0.8
                                    }}
                                ></div>
                                <span className="text-[8px] font-bold text-slate-400 mt-2">{years[i]}</span>
                                <div className="absolute -top-8 bg-slate-800 text-white text-[9px] px-1.5 py-1 rounded opacity-0 group-hover/bar:opacity-100 transition-opacity pointer-events-none">
                                    {v}%
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        function App() {
          const [ready, setReady] = useState(false);
          const [analysis, setAnalysis] = useState({ loading: false, data: null });
          const [modal, setModal] = useState({ open: false, loading: false, title: '', content: '' });

          useEffect(() => {
            setTimeout(() => setReady(true), 100);
          }, []);

          const generateGlobalReport = async () => {
            setAnalysis({ loading: true, data: null });
            const prompt = "Genera un resumen ejecutivo de 2 párrafos sobre los datos de compatibilidad AoL de la FEN: Especialidad (64%), Comunicación (56%) y Ética (15%). Sé profesional y sugiere un foco para 2026.";
            const result = await askGemini(prompt, "Eres un analista de acreditación universitaria de la FEN UCHILE.");
            setAnalysis({ loading: false, data: result });
          };

          const openActionPlan = async (name, values, color) => {
            setModal({ open: true, loading: true, title: name, content: '' });
            const val = values[values.length - 1];
            const prompt = `La competencia '${name}' tiene un ${val}% de compatibilidad. Da 3 consejos breves y técnicos para que los docentes mejoren la redacción de sus preguntas de examen en esta área.`;
            const result = await askGemini(prompt, "Eres un experto en evaluación educativa.");
            setModal(prev => ({ ...prev, loading: false, content: result }));
          };

          return (
            <div className="max-w-4xl mx-auto p-4 md:py-12">
              <div className="bg-white rounded-[2.5rem] shadow-2xl border border-slate-200 overflow-hidden animate-fade-in">
                
                {/* Header */}
                <div className="p-8 md:p-12 border-b border-slate-50 flex flex-col md:flex-row justify-between items-start md:items-center gap-8">
                  <div className="space-y-2">
                    <div className="flex items-center gap-3">
                        <span className="px-2 py-1 bg-blue-600 text-white text-[9px] font-black rounded uppercase tracking-widest">AoL v2026</span>
                        <p className="text-slate-400 font-bold text-[10px] uppercase tracking-widest">Universidad de Chile • FEN</p>
                    </div>
                    <h1 className="text-4xl font-black text-slate-900 tracking-tight">Dashboard de Compatibilidad</h1>
                    <p className="text-slate-500 text-sm">Validación de instrumentos de evaluación de egreso (2021-2025)</p>
                  </div>
                  <button 
                    onClick={generateGlobalReport}
                    disabled={analysis.loading}
                    className="group relative bg-slate-900 text-white px-8 py-4 rounded-2xl font-bold text-sm hover:bg-blue-600 transition-all flex items-center gap-3 disabled:opacity-50"
                  >
                    {analysis.loading ? "Procesando..." : "✨ Síntesis Inteligente"}
                  </button>
                </div>

                {/* Síntesis AI */}
                {analysis.data && (
                  <div className="mx-8 md:mx-12 mt-8 p-8 bg-blue-50 rounded-3xl border border-blue-100 animate-fade-in">
                    <h2 className="text-blue-900 font-black text-[10px] uppercase tracking-[0.2em] mb-4 flex items-center gap-2">
                        <span className="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span> Perspectiva Estratégica
                    </h2>
                    <TextFormatter text={analysis.data} />
                  </div>
                )}

                {/* Categorías */}
                <div className="p-8 md:p-12 space-y-16">
                  {groupedData.map((cat, i) => (
                    <div key={i} className="animate-fade-in" style={{ animationDelay: `${i*0.1}s` }}>
                      <div className="flex items-center gap-4 mb-8">
                        <div className="h-8 w-1 rounded-full" style={{ backgroundColor: cat.color }}></div>
                        <h2 className="text-xs font-black text-slate-400 uppercase tracking-widest">{cat.category}</h2>
                      </div>
                      <div className="bg-slate-50/50 rounded-[2rem] p-6 md:p-10 border border-slate-100 shadow-sm">
                        {cat.items.map((item, j) => (
                          <BarChartRow key={j} {...item} color={cat.color} active={ready} onAction={openActionPlan} />
                        ))}
                      </div>
                    </div>
                  ))}
                </div>

                <footer className="p-10 bg-slate-50 text-center border-t border-slate-100">
                    <p className="text-[10px] text-slate-400 font-black uppercase tracking-[0.3em]">Centro de Enseñanza y Aprendizaje • 2026</p>
                </footer>
              </div>

              {/* MODAL (EL RECUADRO QUE TE GUSTÓ) */}
              {modal.open && (
                <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in">
                  <div className="bg-white w-full max-w-xl rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col max-h-[85vh]">
                    <div className="p-8 border-b border-slate-50 flex justify-between items-center bg-white">
                      <div className="pr-4">
                        <p className="text-blue-600 font-black text-[10px] uppercase tracking-widest mb-1">Acción Recomendada</p>
                        <h3 className="text-xl font-black text-slate-900 leading-tight">{modal.title}</h3>
                      </div>
                      <button 
                        onClick={() => setModal({open: false})}
                        className="p-2 bg-slate-100 text-slate-500 rounded-full hover:bg-red-50 hover:text-red-500 transition-all"
                      >
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                      </button>
                    </div>
                    
                    <div className="p-8 overflow-y-auto custom-scroll flex-1">
                      {modal.loading ? (
                        <div className="flex flex-col items-center justify-center py-12 text-slate-400 gap-4">
                          <div className="w-10 h-10 border-4 border-blue-100 border-t-blue-600 rounded-full animate-spin"></div>
                          <p className="text-xs font-bold uppercase tracking-widest">Consultando experto...</p>
                        </div>
                      ) : (
                        <div className="animate-fade-in">
                           <TextFormatter text={modal.content} />
                        </div>
                      )}
                    </div>

                    <div className="p-8 bg-slate-50 border-t border-slate-100 flex justify-center">
                        <button 
                            onClick={() => setModal({open: false})}
                            className="bg-white border border-slate-200 text-slate-900 px-10 py-3 rounded-2xl font-bold text-xs uppercase tracking-widest hover:shadow-md transition-all active:scale-95"
                        >
                            Cerrar Sugerencia
                        </button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
